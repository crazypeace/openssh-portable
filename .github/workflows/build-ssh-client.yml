name: Build OpenSSH Client

on:
  push:
    branches: [ my-10.0p1-custom ]
  workflow_dispatch:

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libtool libssl-dev zlib1g-dev

    - name: Build
      run: |
        autoreconf -fi
        ./configure
        make -j$(nproc)
        ls -la ssh

    - name: Upload ssh
      uses: actions/upload-artifact@v4
      with:
        name: ssh-client-ubuntu
        path: ssh
        retention-days: 30
