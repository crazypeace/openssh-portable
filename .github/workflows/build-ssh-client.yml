name: Build OpenSSH Client

on:
  push:
    branches: [ my-10.0p1-custom ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install deps
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential autoconf automake libtool libssl-dev zlib1g-dev

    - name: Build
      run: |
        autoreconf -fi
        ./configure
        make -j$(nproc)
        ls -la ssh

    - name: Create Release and Upload Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="${{ github.event.inputs.tag_name || format('build-{0}', github.run_number) }}"
        gh release create "$TAG_NAME" \
          --repo "${{ github.repository }}" \
          --title "OpenSSH Client Build ${{ github.run_number }}" \
          --notes "**Automated build from \`my-10.0p1-custom\` branch**

        **Changes:**
        - Modified sshconnect2.c for login analysis
        - Custom version string in version.h
        - Added SSH_CLIENT_LOGIN_ANALYSIS.md

        **Binary:** ssh (Ubuntu x86_64)" \
          ssh
