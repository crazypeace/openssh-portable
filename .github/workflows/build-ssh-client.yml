name: Build OpenSSH Client

on:
  push:
    branches: [ my-10.0p1-custom ]
  pull_request:
    branches: [ my-10.0p1-custom ]
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: Build on Ubuntu
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf automake libtool make gcc zlib1g-dev libssl-dev

    - name: Configure and Build
      run: |
        autoreconf -fi
        ./configure
        make -j$(nproc)

    - name: Test binaries
      run: |
        ls -la ssh ssh-keygen ssh-add ssh-agent ssh-keyscan
        ./ssh -V

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-client-ubuntu
        path: |
          ssh
          ssh-keygen
          ssh-add
          ssh-agent
          ssh-keyscan
        retention-days: 30

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew update
        brew install autoconf automake libtool openssl

    - name: Configure and Build
      run: |
        autoreconf -fi
        ./configure
        make -j$(sysctl -n hw.ncpu)

    - name: Test binaries
      run: |
        ls -la ssh ssh-keygen ssh-add ssh-agent ssh-keyscan
        ./ssh -V

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ssh-client-macos
        path: |
          ssh
          ssh-keygen
          ssh-add
          ssh-agent
          ssh-keyscan
        retention-days: 30
